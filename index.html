<!DOCTYPE html>
<html>
<head>
<title>Sugarpixel</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#000;
}

model-viewer{
  width:100vw;
  height:100vh;
  --poster-color: transparent;
}

model-viewer:hover{
  filter:
    drop-shadow(0 0 20px #8B5CF6)
    drop-shadow(0 0 40px #8B5CF6)
    drop-shadow(0 0 80px #8B5CF6);
}
</style>
</head>

<body>

<model-viewer
  src="./Sugarpixel_Logo.glb"
  camera-controls
  auto-rotate
  auto-rotate-delay="0"
  rotation-per-second="20deg"
  camera-orbit="0deg 90deg 3m"
  field-of-view="18deg"
  exposure="1.3"
  shadow-intensity="0"
  shadow-softness="0"
  interaction-prompt="none">
</model-viewer>

</body>
</html>
