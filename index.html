<!DOCTYPE html>
<html>
<head>
<title>Sugarpixel</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#D8FF00;
height:100vh;
overflow:hidden;
}

model-viewer{
width:100vw;
height:100vh;
}
</style>
</head>

<body>

<model-viewer
src="./Sugarpixel_Logo.glb"
camera-controls
auto-rotate
camera-orbit="0deg 75deg 3m"
shadow-intensity="1"
interaction-prompt="none">
  camera-orbit="0deg 85deg 3m"
</model-viewer>

</body>
</html>
